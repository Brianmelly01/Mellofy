<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber Login UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #02050e;
            /* Dark theme background mimicking the screen */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 850px;
            height: 500px;
            background: #050a10;
            /* Very dark inner background */
            border: 2px solid #00f3ff;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4), inset 0 0 15px rgba(0, 243, 255, 0.2);
            overflow: hidden;
        }

        /* Common forms layout */
        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 60px;
            transition: all 0.6s ease-in-out;
            z-index: 1;
        }

        /* Left form (Login) visible by default */
        .sign-in-container {
            left: 0;
            z-index: 2;
        }

        /* Right form (Register) hidden by default */
        .sign-up-container {
            right: 0;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* When right-panel-active is added, swap the opacities */
        .container.right-panel-active .sign-in-container {
            opacity: 0;
            pointer-events: none;
        }

        .container.right-panel-active .sign-up-container {
            opacity: 1;
            pointer-events: auto;
            z-index: 2;
        }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.4);
            padding: 10px 30px 10px 0;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-bottom-color: #00f3ff;
        }

        .input-group input::placeholder {
            color: #999;
            font-weight: 500;
        }

        .input-group .icon {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: #fff;
            opacity: 0.8;
        }

        /* Pill Button */
        .btn {
            background: linear-gradient(90deg, #104e6c, #26abc9);
            border: 1px solid rgba(0, 243, 255, 0.6);
            border-radius: 30px;
            padding: 12px 0;
            width: 100%;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s, filter 0.3s;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            filter: brightness(1.15);
        }

        /* Links at the bottom */
        .switch-text {
            margin-top: 25px;
            font-size: 12px;
            color: #ccc;
            text-align: center;
        }

        .switch-text a {
            color: #00f3ff;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            cursor: pointer;
            transition: text-shadow 0.3s;
        }

        .switch-text a:hover {
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
        }

        /* Sliding Teal Overlay */
        /* width is slightly more than 50% to accommodate the slant */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 45%;
            width: 55%;
            height: 100%;
            background: linear-gradient(135deg, #0f3a4b 0%, #1c819d 100%);
            z-index: 100;
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            /* Slanted Left edge for the Login view (right position) */
            clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%);
        }

        /* Move to left and invert slant when opening Register */
        .container.right-panel-active .overlay-container {
            left: 0;
            /* Slanted Right edge for the Register view (left position) */
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);
        }

        /* Moving inner text container of overlay */
        .overlay-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s ease-in-out, opacity 0.5s ease;
        }

        /* The left side of overlay content (shows when overlay is left/Register) */
        .overlay-left {
            opacity: 0;
            transform: translateX(-50px);
            padding-right: 20%;
            /* Keep text away from right slant */
        }

        /* The right side of overlay content (shows when overlay is right/Login) */
        .overlay-right {
            opacity: 1;
            transform: translateX(0);
            padding-left: 20%;
            /* Keep text away from left slant */
        }

        .container.right-panel-active .overlay-left {
            opacity: 1;
            transform: translateX(0);
        }

        .container.right-panel-active .overlay-right {
            opacity: 0;
            transform: translateX(50px);
            pointer-events: none;
        }

        .overlay-panel h1 {
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.5);
            line-height: 1.2;
        }
    </style>
</head>

<body>

    <div class="container" id="container">

        <!-- Register Form (Left side when overlay moves left) -->
        <div class="form-container sign-up-container">
            <form action="#" id="register-form">
                <h1>Register</h1>
                <div class="input-group">
                    <input type="text" placeholder="Username" required />
                    <!-- User SVG -->
                    <svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                    </svg>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email" required />
                    <!-- Envelope SVG -->
                    <svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                    </svg>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required />
                    <!-- Lock SVG -->
                    <svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                    </svg>
                </div>
                <button type="button" class="btn">Register</button>
                <div class="switch-text">
                    Already have an account? <a id="go-to-login">Sign In</a>
                </div>
            </form>
        </div>

        <!-- Login Form (Right side when overlay moves right) -->
        <div class="form-container sign-in-container">
            <form action="#" id="login-form">
                <h1>Login</h1>
                <div class="input-group">
                    <input type="text" placeholder="Username" required />
                    <!-- User SVG -->
                    <svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                    </svg>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required />
                    <!-- Lock SVG -->
                    <svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                    </svg>
                </div>
                <button type="button" class="btn">Login</button>
                <div class="switch-text">
                    Don't have an account? <a id="go-to-register">Sign Up</a>
                </div>
            </form>
        </div>

        <!-- Slicing Overlay Panel -->
        <div class="overlay-container">
            <div class="overlay-content">
                <!-- Shows when container moves left (Register) -->
                <div class="overlay-panel overlay-left">
                    <h1>WELCOME!</h1>
                </div>
                <!-- Shows when container is default right (Login) -->
                <div class="overlay-panel overlay-right">
                    <h1>WELCOME<br>BACK!</h1>
                </div>
            </div>
        </div>

    </div>

    <script>
        const container = document.getElementById('container');
        const goToRegisterBtn = document.getElementById('go-to-register');
        const goToLoginBtn = document.getElementById('go-to-login');

        // Add 'right-panel-active' to transition to the Register view
        goToRegisterBtn.addEventListener('click', () => {
            container.classList.add('right-panel-active');
        });

        // Remove 'right-panel-active' to transition back to the Login view
        goToLoginBtn.addEventListener('click', () => {
            container.classList.remove('right-panel-active');
        });
    </script>

</body>

</html>
